services:
  api:
    build:
      context: ../backend
    image: synday-api:latest
    restart: unless-stopped
    network_mode: host
    cpus: 1.0
    mem_limit: 512m
    pids_limit: 128
    env_file:
      - .env
    environment:
      LISTEN_ADDR: 127.0.0.1:8080
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD", "/app/synday-api", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
