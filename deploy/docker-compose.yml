services:
  api:
    build:
      context: ../backend
    image: synday-api:latest
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "/app/synday-api", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

