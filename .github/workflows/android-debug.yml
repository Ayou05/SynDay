name: Android debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "frontend/**"
      - ".github/workflows/android-debug.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;29.0.14206865"

      - name: Install Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build arm64 debug APK
        working-directory: frontend
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
          VITE_API_BASE_URL: https://api.synday.catclaw.cloud
          VITE_SUPABASE_URL: https://abuhrrrqvpivzdvwkmik.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          VITE_GOEASY_HOST: hangzhou.goeasy.io
          VITE_GOEASY_APP_KEY: ${{ secrets.GOEASY_APP_KEY }}
        run: npx tauri android build --debug --apk --target aarch64 --ci

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: synday-android-arm64-debug
          path: frontend/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14
